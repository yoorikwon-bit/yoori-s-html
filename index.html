<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>테스트 페이지</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 60px 80px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { color: #667eea; font-size: 2.5rem; margin-bottom: 10px; }
    p { color: #666; font-size: 1.2rem; }
    .badge {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 8px 20px;
      border-radius: 999px;
      margin-top: 20px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎉 배포 성공!</h1>
    <p>GitHub Pages가 정상적으로 작동하고 있어요.</p>
    <div class="badge">by yoorikwon-bit</div>
  </div>
</body>
</html>
